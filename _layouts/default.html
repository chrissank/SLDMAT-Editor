<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.name }}</title>
  <meta name="description" content="Browser-based editor for SolidWorks material library files (.sldmat). No install required." />
  <meta property="og:title" content="SLDMAT Editor" />
  <meta property="og:description" content="Browser-based editor for SolidWorks material library files (.sldmat). No install required." />
  <meta property="og:url" content="https://sldmateditor.csankey.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://sldmateditor.csankey.com/preview.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SLDMAT Editor" />
  <meta name="twitter:description" content="Browser-based editor for SolidWorks material library files (.sldmat). No install required." />
  <meta name="twitter:image" content="https://sldmateditor.csankey.com/preview.svg" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #24292f;
      max-width: 780px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }
    h1, h2, h3 { font-weight: 600; margin: 1.5em 0 0.5em; line-height: 1.25; }
    h1 { font-size: 2em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
    h2 { font-size: 1.4em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
    p { margin: 0.75em 0; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.875em; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 4px; padding: 0.2em 0.4em; }
    pre { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: 16px; overflow-x: auto; }
    pre code { background: none; border: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #d0d7de; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; }
    ul, ol { margin: 0.75em 0; padding-left: 2em; }
    li { margin: 0.25em 0; }
    strong { font-weight: 600; }
    hr { border: none; border-top: 1px solid #d0d7de; margin: 2em 0; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
